<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VokabelTrainer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0d0d;
  --bg2:    #161616;
  --bg3:    #1f1f1f;
  --border: #2a2a2a;
  --text:   #f0f0f0;
  --text2:  #888;
  --text3:  #555;
  --en:     #38bdf8;
  --fr:     #a78bfa;
  --it:     #34d399;
  --es:     #fb923c;
  --ok:     #22c55e;
  --fail:   #ef4444;
  --r:      10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden}

/* ── HEADER ── */
.header{padding:1.5rem 1.5rem 0;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo span{font-family:'Syne Mono',monospace;color:var(--text2)}
.profile-badge{font-size:12px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;cursor:pointer}
.profile-badge:hover{border-color:var(--text3)}

/* ── SCREEN SYSTEM ── */
.screen{display:none;padding:1.5rem;min-height:calc(100vh - 60px)}
.screen.active{display:block}

/* ── SELECTION SCREEN ── */
.section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem}
.lang-btn{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:all .15s;text-align:left}
.lang-btn:hover{border-color:var(--text3);background:var(--bg3)}
.lang-btn.active{border-color:var(--accent);background:rgba(255,255,255,.04)}
.lang-icon{font-size:28px;margin-bottom:.5rem}
.lang-name{font-size:14px;font-weight:700;color:var(--text)}
.lang-sub{font-size:11px;color:var(--text3)}

.unit-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;margin-bottom:2rem}
.unit-btn{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:.75rem .5rem;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:all .15s;text-align:center;font-family:'Syne',sans-serif}
.unit-btn:hover{border-color:var(--text3);color:var(--text)}
.unit-btn.active{border-color:var(--accent);color:var(--text)}
.unit-btn .pct{font-size:10px;color:var(--ok);margin-top:2px}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem}
.mode-btn{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:all .15s;font-family:'Syne',sans-serif}
.mode-btn:hover{border-color:var(--text3)}
.mode-btn.active{border-color:var(--accent)}
.mode-icon{font-size:24px;margin-bottom:.5rem}
.mode-name{font-size:14px;font-weight:700;color:var(--text)}
.mode-sub{font-size:11px;color:var(--text3);margin-top:2px}

.start-btn{width:100%;padding:1rem;background:var(--accent);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#000;cursor:pointer;transition:opacity .15s}
.start-btn:hover{opacity:.85}
.start-btn:disabled{opacity:.3;cursor:default}

/* ── CARD SCREEN ── */
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.card-counter{font-size:11px;color:var(--text3);text-align:center;margin-bottom:1.5rem;font-family:'Syne Mono',monospace}

.flashcard{perspective:1000px;margin-bottom:1.5rem;cursor:pointer;height:220px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.card-front{background:var(--bg2);border:2px solid var(--border)}
.card-back{background:var(--bg3);border:2px solid var(--accent);transform:rotateY(180deg)}
.card-word{font-size:32px;font-weight:800;margin-bottom:.5rem}
.card-pos{font-size:11px;color:var(--text3);font-family:'Syne Mono',monospace;margin-bottom:.75rem}
.card-hint{font-size:12px;color:var(--text3)}
.card-translation{font-size:26px;font-weight:700;color:var(--accent);margin-bottom:.75rem}
.card-example{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic}
.tap-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:1rem}

.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem}
.card-action{padding:1rem;border:2px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;background:transparent}
.card-action.ok{border-color:var(--ok);color:var(--ok)}
.card-action.ok:hover{background:rgba(34,197,94,.1)}
.card-action.fail{border-color:var(--fail);color:var(--fail)}
.card-action.fail:hover{background:rgba(239,68,68,.1)}

/* ── MC SCREEN ── */
.mc-word{font-size:36px;font-weight:800;text-align:center;margin:1.5rem 0;letter-spacing:-1px}
.mc-pos{font-size:11px;color:var(--text3);text-align:center;font-family:'Syne Mono',monospace;margin-bottom:1.5rem}
.mc-opts{display:grid;gap:.625rem}
.mc-opt{width:100%;padding:.875rem 1rem;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;text-align:left}
.mc-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(255,255,255,.03)}
.mc-opt.correct{border-color:var(--ok);background:rgba(34,197,94,.1);color:var(--ok)}
.mc-opt.wrong{border-color:var(--fail);background:rgba(239,68,68,.08);color:var(--fail)}
.mc-opt:disabled{cursor:default}
.mc-example{font-size:12px;color:var(--text2);font-style:italic;text-align:center;margin-top:1rem;line-height:1.6;display:none}
.mc-next{width:100%;padding:.875rem;margin-top:1rem;background:var(--accent);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;display:none}

/* ── RESULT SCREEN ── */
.result-wrap{text-align:center;padding:2rem 0}
.result-score{font-size:64px;font-weight:800;line-height:1}
.result-label{font-size:13px;color:var(--text3);margin:.5rem 0 2rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.stat-val{font-size:24px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}
.result-actions{display:grid;gap:.75rem}
.btn-secondary{width:100%;padding:.875rem;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer}
.btn-secondary:hover{border-color:var(--text3)}

/* ── PROFILE MODAL ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;padding:1.5rem;align-items:flex-end}
.modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-height:70vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;margin-bottom:1rem}
.profile-list{display:grid;gap:.5rem}
.profile-item{padding:.875rem;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:600;transition:border-color .15s}
.profile-item:hover,.profile-item.active{border-color:var(--accent)}
.profile-sub{font-size:11px;color:var(--text3);margin-top:2px}
.modal-close{width:100%;padding:.75rem;margin-top:1rem;background:transparent;border:1px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;color:var(--text2);cursor:pointer}

/* ── TTS BUTTON ── */
.tts-btn{background:none;border:none;font-size:20px;cursor:pointer;margin-left:.5rem;opacity:.6;transition:opacity .15s;vertical-align:middle}
.tts-btn:hover{opacity:1}

/* ── UTILS ── */
.back-btn{background:none;border:none;color:var(--text3);font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;padding:0;margin-bottom:1.5rem;display:flex;align-items:center;gap:.375rem}
.back-btn:hover{color:var(--text)}
.loading{text-align:center;color:var(--text3);font-size:13px;padding:2rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:.625rem 1.25rem;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Vokabel<span>Trainer</span></div>
  <div class="profile-badge" onclick="openProfileModal()" id="profile-badge">Profil wählen</div>
</div>

<!-- SELECTION SCREEN -->
<div class="screen active" id="screen-select">
  <div class="section-title">Sprache</div>
  <div class="lang-grid">
    <button class="lang-btn" data-lang="en" onclick="selLang(this)">
      <div class="lang-icon">🇬🇧</div>
      <div class="lang-name">English</div>
      <div class="lang-sub">A1 – C1</div>
    </button>
    <button class="lang-btn" data-lang="fr" onclick="selLang(this)">
      <div class="lang-icon">🇫🇷</div>
      <div class="lang-name">Français</div>
      <div class="lang-sub">A1 – C1</div>
    </button>
    <button class="lang-btn" data-lang="it" onclick="selLang(this)">
      <div class="lang-icon">🇮🇹</div>
      <div class="lang-name">Italiano</div>
      <div class="lang-sub">A1 – C1</div>
    </button>
    <button class="lang-btn" data-lang="es" onclick="selLang(this)">
      <div class="lang-icon">🇪🇸</div>
      <div class="lang-name">Español</div>
      <div class="lang-sub">A1 – C1</div>
    </button>
  </div>

  <div class="section-title">Unit</div>
  <div class="unit-grid" id="unit-grid">
    <!-- wird dynamisch befüllt -->
  </div>

  <div class="section-title">Modus</div>
  <div class="mode-grid">
    <button class="mode-btn active" data-mode="flash" onclick="selMode(this)">
      <div class="mode-icon">🃏</div>
      <div class="mode-name">Karten</div>
      <div class="mode-sub">Umdrehen & bewerten</div>
    </button>
    <button class="mode-btn" data-mode="mc" onclick="selMode(this)">
      <div class="mode-icon">✅</div>
      <div class="mode-name">Multiple Choice</div>
      <div class="mode-sub">4 Antworten wählen</div>
    </button>
  </div>

  <button class="start-btn" id="start-btn" onclick="startSession()" disabled>Lernen starten →</button>
</div>

<!-- FLASHCARD SCREEN -->
<div class="screen" id="screen-flash">
  <button class="back-btn" onclick="goBack()">← Zurück</button>
  <div class="progress-bar"><div class="progress-fill" id="flash-progress"></div></div>
  <div class="card-counter" id="flash-counter"></div>

  <div class="flashcard" onclick="flipCard()" id="flashcard">
    <div class="card-inner" id="card-inner">
      <div class="card-front">
        <div class="card-word" id="card-word"></div>
        <div class="card-pos" id="card-pos"></div>
        <div class="card-hint">Tippen zum Umdrehen</div>
      </div>
      <div class="card-back">
        <div class="card-translation" id="card-translation"></div>
        <div class="card-example" id="card-example"></div>
      </div>
    </div>
  </div>

  <div class="tap-hint" id="tap-hint">Tippe die Karte um die Übersetzung zu sehen</div>
  <div class="card-actions" id="card-actions" style="display:none">
    <button class="card-action fail" onclick="rateCard(false)">✗ Noch nicht</button>
    <button class="card-action ok" onclick="rateCard(true)">✓ Gewusst</button>
  </div>
</div>

<!-- MC SCREEN -->
<div class="screen" id="screen-mc">
  <button class="back-btn" onclick="goBack()">← Zurück</button>
  <div class="progress-bar"><div class="progress-fill" id="mc-progress"></div></div>
  <div class="card-counter" id="mc-counter"></div>
  <div class="mc-word" id="mc-word"></div>
  <div class="mc-pos" id="mc-pos"></div>
  <div class="mc-opts" id="mc-opts"></div>
  <div class="mc-example" id="mc-example"></div>
  <button class="mc-next" id="mc-next" onclick="nextMC()">Weiter →</button>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="screen-result">
  <div class="result-wrap">
    <div class="result-score" id="result-score"></div>
    <div class="result-label">Richtig beantwortet</div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-correct" style="color:var(--ok)"></div>
        <div class="stat-lbl">Gewusst</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-wrong" style="color:var(--fail)"></div>
        <div class="stat-lbl">Noch lernen</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="start-btn" onclick="restartSession()">Nochmals</button>
      <button class="btn-secondary" onclick="showScreen('screen-select')">Neue Unit wählen</button>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="profile-modal" onclick="closeProfileModal(event)">
  <div class="modal-box">
    <div class="modal-title">Profil wählen</div>
    <div class="profile-list" id="profile-list">
      <div class="loading">Lade Profile...</div>
    </div>
    <button class="modal-close" onclick="closeProfileModal()">Schliessen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  await loadProfiles();
  buildUnitGrid();
  updateAccent();
});

// ── PROFILES ──
let profiles = [];

async function loadProfiles() {
  try {
    const { data, error } = await sb.from('profiles').select('*').order('created_at');
    if (error) throw error;
    profiles = data || [];
    if (profiles.length > 0) {
      ST.profile = profiles[0];
      updateProfileBadge();
      await loadProgress();
      buildUnitGrid();
    }
  } catch(e) {
    console.warn('Profiles load:', e.message);
  }
}

function updateProfileBadge() {
  const el = document.getElementById('profile-badge');
  if (ST.profile) {
    el.textContent = ST.profile.name;
  }
}

function openProfileModal() {
  const list = document.getElementById('profile-list');
  if (profiles.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;">Keine Profile gefunden. Bitte zuerst in EduPlatform ein Profil anlegen.</div>';
  } else {
    list.innerHTML = profiles.map(p => `
      <div class="profile-item ${ST.profile?.id === p.id ? 'active' : ''}" onclick="selectProfile('${p.id}')">
        ${p.name}
        <div class="profile-sub">${p.profile_type?.toUpperCase()} · ${p.level || '–'}</div>
      </div>
    `).join('');
  }
  document.getElementById('profile-modal').classList.add('open');
}

async function selectProfile(id) {
  ST.profile = profiles.find(p => p.id === id);
  updateProfileBadge();
  closeProfileModal();
  await loadProgress();
  buildUnitGrid();
  toast('👤 ' + ST.profile.name);
}

function closeProfileModal(e) {
  if (!e || e.target === document.getElementById('profile-modal')) {
    document.getElementById('profile-modal').classList.remove('open');
  }
}

// ── PROGRESS (Supabase) ──
async function loadProgress() {
  if (!ST.profile) return;
  try {
    const { data, error } = await sb
      .from('vocab_progress')
      .select('word,known,language')
      .eq('profile_id', ST.profile.id);
    if (error) throw error;
    ST.progress = {};
    (data || []).forEach(row => {
      const key = row.language;
      if (!ST.progress[key]) ST.progress[key] = {};
      ST.progress[key][row.word] = row.known;
    });
  } catch(e) { console.warn('Progress load:', e.message); }
}

async function saveWordProgress(lang, unitIdx, wordIdx, known) {
  if (!ST.profile) return;
  const key = `${unitIdx}:${wordIdx}`;
  if (!ST.progress[lang]) ST.progress[lang] = {};
  ST.progress[lang][key] = known;
  try {
    await sb.from('vocab_progress').upsert({
      profile_id: ST.profile.id,
      language: lang,
      word: key,
      known,
      updated_at: new Date().toISOString()
    }, { onConflict: 'profile_id,language,word' });
  } catch(e) { console.warn('Progress save:', e.message); }
}

function getUnitPct(lang, unitIdx) {
  const db = VKDB[lang];
  if (!db || !db[unitIdx]) return 0;
  const total = db[unitIdx].length;
  if (!total) return 0;
  const prog = ST.progress[lang] || {};
  let known = 0;
  for (let i = 0; i < total; i++) {
    if (prog[`${unitIdx}:${i}`]) known++;
  }
  return Math.round(known / total * 100);
}

// ── SELECTION ──
function updateAccent() {
  const lang = ST.lang || 'en';
  const colors = {en:'#38bdf8', fr:'#a78bfa', it:'#34d399', es:'#fb923c'};
  document.documentElement.style.setProperty('--accent', colors[lang] || colors.en);
}

function selLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ST.lang = btn.dataset.lang;
  ST.unit = null;
  updateAccent();
  buildUnitGrid();
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  checkStartBtn();
}

function buildUnitGrid() {
  const grid = document.getElementById('unit-grid');
  const lang = ST.lang || 'en';
  grid.innerHTML = VK_UNITS.map((u, i) => {
    const pct = getUnitPct(lang, i);
    const words = VKDB[lang][i]?.length || 0;
    return `<button class="unit-btn ${ST.unit === i ? 'active' : ''}" onclick="selUnit(this,${i})">
      <div>${u.icon}</div>
      <div>Unit ${i+1}</div>
      ${pct > 0 ? `<div class="pct">${pct}%</div>` : `<div style="font-size:9px;color:var(--text3)">${words}W</div>`}
    </button>`;
  }).join('');
}

function selUnit(btn, idx) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ST.unit = idx;
  checkStartBtn();
}

function selMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ST.mode = btn.dataset.mode;
}

function checkStartBtn() {
  const btn = document.getElementById('start-btn');
  btn.disabled = !(ST.lang && ST.unit !== null);
}

// ── SESSION START ──
function startSession() {
  const db = VKDB[ST.lang];
  if (!db || !db[ST.unit] || !db[ST.unit].length) {
    toast('⚠️ Keine Vokabeln für diese Unit'); return;
  }
  ST.words = [...db[ST.unit]].map((w, i) => ({...w, idx: i}));
  // Shuffle
  for (let i = ST.words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ST.words[i], ST.words[j]] = [ST.words[j], ST.words[i]];
  }
  ST.idx = 0; ST.correct = 0; ST.wrong = 0;
  if (ST.mode === 'flash') {
    showScreen('screen-flash');
    showFlashCard();
  } else {
    showScreen('screen-mc');
    showMCCard();
  }
}

function restartSession() {
  startSession();
}

// ── FLASHCARD ──
let cardFlipped = false;

function showFlashCard() {
  cardFlipped = false;
  const inner = document.getElementById('card-inner');
  inner.classList.remove('flipped');
  document.getElementById('card-actions').style.display = 'none';
  document.getElementById('tap-hint').style.display = 'block';

  const w = ST.words[ST.idx];
  document.getElementById('card-word').innerHTML = w.w + `<button class="tts-btn" onclick="event.stopPropagation();speak('${w.w.replace(/'/g,"\\'")}','${ST.lang}')">🔊</button>`;
  document.getElementById('card-pos').textContent = w.p || '';
  document.getElementById('card-translation').textContent = w.tr;
  document.getElementById('card-example').textContent = w.ex || '';

  updateFlashProgress();
}

function flipCard() {
  if (cardFlipped) return;
  cardFlipped = true;
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('card-actions').style.display = 'grid';
}

function rateCard(known) {
  const w = ST.words[ST.idx];
  saveWordProgress(ST.lang, ST.unit, w.idx, known);
  if (known) ST.correct++; else ST.wrong++;
  ST.idx++;
  if (ST.idx >= ST.words.length) {
    showResult();
  } else {
    showFlashCard();
  }
}

function updateFlashProgress() {
  const pct = ST.idx / ST.words.length * 100;
  document.getElementById('flash-progress').style.width = pct + '%';
  document.getElementById('flash-counter').textContent = `${ST.idx + 1} / ${ST.words.length}`;
}

// ── MULTIPLE CHOICE ──
function showMCCard() {
  const w = ST.words[ST.idx];
  const db = VKDB[ST.lang][ST.unit];

  document.getElementById('mc-word').innerHTML = w.w + `<button class="tts-btn" onclick="speak('${w.w.replace(/'/g,"\\'")}','${ST.lang}')">🔊</button>`;
  document.getElementById('mc-pos').textContent = w.p || '';
  document.getElementById('mc-example').style.display = 'none';
  document.getElementById('mc-next').style.display = 'none';

  // 4 Optionen: 1 richtig + 3 falsche
  const allWords = db.filter(x => x.w !== w.w);
  const shuffled = allWords.sort(() => Math.random() - .5).slice(0, 3);
  const opts = [...shuffled.map(x => x.tr), w.tr].sort(() => Math.random() - .5);

  document.getElementById('mc-opts').innerHTML = opts.map(opt => `
    <button class="mc-opt" onclick="checkMC(this,'${opt.replace(/'/g,"\\'")}','${w.tr.replace(/'/g,"\\'")}','${(w.ex||'').replace(/'/g,"\\'")}')">${opt}</button>
  `).join('');

  updateMCProgress();
}

function checkMC(btn, chosen, correct, example) {
  document.querySelectorAll('.mc-opt').forEach(b => b.disabled = true);
  if (chosen === correct) {
    btn.classList.add('correct');
    ST.correct++;
    saveWordProgress(ST.lang, ST.unit, ST.words[ST.idx].idx, true);
  } else {
    btn.classList.add('wrong');
    ST.wrong++;
    saveWordProgress(ST.lang, ST.unit, ST.words[ST.idx].idx, false);
    // Richtige Antwort markieren
    document.querySelectorAll('.mc-opt').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }
  if (example) {
    const ex = document.getElementById('mc-example');
    ex.textContent = example;
    ex.style.display = 'block';
  }
  document.getElementById('mc-next').style.display = 'block';
}

function nextMC() {
  ST.idx++;
  if (ST.idx >= ST.words.length) {
    showResult();
  } else {
    showMCCard();
  }
}

function updateMCProgress() {
  const pct = ST.idx / ST.words.length * 100;
  document.getElementById('mc-progress').style.width = pct + '%';
  document.getElementById('mc-counter').textContent = `${ST.idx + 1} / ${ST.words.length}`;
}

// ── RESULT ──
function showResult() {
  const total = ST.words.length;
  const pct = Math.round(ST.correct / total * 100);
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-score').style.color = pct >= 70 ? 'var(--ok)' : pct >= 40 ? 'var(--accent)' : 'var(--fail)';
  document.getElementById('stat-correct').textContent = ST.correct;
  document.getElementById('stat-wrong').textContent = ST.wrong;
  showScreen('screen-result');
  buildUnitGrid(); // Fortschritt aktualisieren
}

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack() {
  showScreen('screen-select');
  buildUnitGrid();
}

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = LANG_BCP[lang] || 'en-GB';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
